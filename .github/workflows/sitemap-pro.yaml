name: Auto Generate Sitemap Clean URLs Pro

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sitemap_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Bikin Sitemap Otomatis
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://sairootmusic.com/
          drop-github-md: true
          include-html-extension: false
          strip-extension: true

      - name: Rapikan dan Tambah 28 Lagu
        run: |
          # 1. Pastikan file ada sebelum dimodifikasi
          if [ ! -f sitemap.xml ]; then
            echo "Sitemap belum ada, kita buat dasar filenya dulu"
            echo '<?xml version="1.0" encoding="UTF-8"?><urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"></urlset>' > sitemap.xml
          fi

          # 2. Hilangkan sisa /index
          sed -i 's/\/index<\/loc>/<\/loc>/g' sitemap.xml
          
          # 3. List 28 Lagu (Gunakan pemisah baris agar aman)
          songs="drama-klenik senandung-manis eksploitasi jurus-liar dari-jauh kasih-mengalun genjer-hijau timpang babylon-burn bayang-singgasana blaze-it-up evaluasi-lagi irama-hidup jamaican-sound ormas-tipu-tipu propaganda roots-medication skank-patrol reborn-riddim autopsi-mic salam-dari-timur mantra-malam magic-mushroom rastaman melayang-pelan tanah-hijau bbm-busuk kabur-saja-dulu"
          
          for s in $songs; do
            # Kita pakai simbol @ sebagai delimiter sed agar tidak bentrok dengan slash (/) di URL
            sed -i "/<\/urlset>/i <url><loc>https://sairootmusic.com/music?song=$s</loc><lastmod>$(date +%Y-%m-%d)</lastmod><priority>0.7</priority></url>" sitemap.xml
          done
          
          # 4. Commit dan Push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "SEO: Update sitemap with 28 songs" || echo "No changes"
          git push
