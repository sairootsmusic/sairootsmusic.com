    <style>
        :root { --accent: #1ed760; --bg: #121212; --card: #181818; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 120px; overflow-x: hidden; }
        .container { max-width: 480px; margin: auto; padding: 20px; }
        .back-btn { text-decoration:none; color:#555; font-size:13px; font-weight:600; display:inline-block; margin-bottom:20px; transition:0.3s; }
        .back-btn:hover { color: var(--accent); transform: translateX(-3px); }
        h1 { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
        .subtitle { color: #b3b3b3; margin-bottom: 30px; }
        .section-title-line { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1.5px; margin: 35px 0 12px; border-bottom: 1px solid #282828; padding-bottom: 6px; }
        .song-item { display: flex; align-items: center; padding: 13px 16px; background: var(--card); border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .song-item:hover { background: #282828; }
        .song-item.active { background: #1f1f1f; border-color: var(--accent); }
        .song-item i { margin-right: 16px; color: #888; width: 20px; text-align: center; }
        .song-item.active i { color: var(--accent); }

        /* Player UI */
        .mini-player { position: fixed; bottom: 0; left: 0; width: 100%; background: #181818; border-top: 1px solid #282828; padding: 12px 16px; display: flex; align-items: center; gap: 12px; z-index: 100; cursor: pointer; }
        .mini-cover { width: 50px; height: 50px; border-radius: 8px; overflow: hidden; background: #000; }
        .mini-cover img { width: 100%; height: 100%; object-fit: cover; }
        .mini-info { flex: 1; overflow: hidden; }
        .mini-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-artist { font-size: 12px; color: #b3b3b3; }

        #nowPlaying { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #1f1f1f, #121212); z-index: 2000; display: none; flex-direction: column; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .np-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; font-size: 20px; }
        .np-art { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .np-cover { width: 100%; max-width: 320px; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .np-cover img { width: 100%; height: 100%; object-fit: cover; }
        .np-info { padding: 0 30px 40px; text-align: left; }
        .np-title { font-size: 24px; font-weight: 800; margin-bottom: 5px; }
        .np-artist { font-size: 16px; color: #b3b3b3; }
        .np-controls { padding: 20px 30px 60px; display: flex; justify-content: space-between; align-items: center; }
        .np-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        .np-play-pause { width: 64px; height: 64px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    </style>

<body>

<div class="container">
    <a href="/" class="back-btn"><i class="fas fa-chevron-left"></i> KEMBALI</a>
    <h1>Discography</h1>
    <p class="subtitle">Koleksi rilisan resmi SAI Roots.</p>

    <div id="tracklistUI">
        </div>
</div>

<div class="mini-player" id="miniPlayer" onclick="showNP()">
    <div class="mini-cover"><img id="miniCover" src="https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/sairoots.jpg"></div>
    <div class="mini-info">
        <div class="mini-title" id="miniTitle">Pilih Lagu</div>
        <div class="mini-artist">SAI Roots</div>
    </div>
    <button style="background:none; border:none; color:#fff; font-size:22px; padding:0 10px;"><i class="fas fa-play"></i></button>
</div>

<div id="nowPlaying">
    <div class="np-header">
        <i class="fas fa-chevron-down" onclick="hideNP()"></i>
        <div style="font-size:11px; font-weight:700; letter-spacing:1px; color:#888;">NOW PLAYING</div>
        <i class="fas fa-ellipsis-v"></i>
    </div>
    <div class="np-art"><div class="np-cover"><img id="npCover" src="https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/sairoots.jpg"></div></div>
    <div class="np-info">
        <div class="np-title" id="npTitle">Judul Lagu</div>
        <div class="np-artist">SAI Roots</div>
    </div>
    <div class="np-controls">
        <button class="np-btn"><i class="fas fa-random"></i></button>
        <button class="np-btn"><i class="fas fa-step-backward"></i></button>
        <button class="np-btn np-play-pause"><i class="fas fa-play"></i></button>
        <button class="np-btn"><i class="fas fa-step-forward"></i></button>
        <button class="np-btn"><i class="fas fa-redo"></i></button>
    </div>
</div>

<script>
// JSON Database diperbaiki (Double Quotes pada Key & Value)
const db = [
    { "t": "Drama Klenik", "cat": "Single" },
    { "t": "Senandung Manis", "cat": "Single" },
    { "t": "Eksploitasi", "cat": "Single" },
    { "t": "Jurus Liar", "cat": "Single" },
    { "t": "Dari Jauh", "cat": "Single" },
    { "t": "Kasih Mengalun", "cat": "Single" },
    { "t": "Genjer Hijau", "cat": "Single" },
    { "t": "Timpang", "cat": "Single" },
    { "t": "Babylon Burn", "cat": "Critical Fire", "cover": "https://raw.githubusercontent.com/sairootsmusic/sairootsmusic.com/refs/heads/main/IMG_20260321_173252_172.png" },
    { "t": "Bayang Singgasana", "cat": "Critical Fire", "cover": "https://raw.githubusercontent.com/sairootsmusic/sairootsmusic.com/refs/heads/main/IMG_20260321_173252_172.png" },
    { "t": "Blaze It Up", "cat": "Critical Fire", "cover": "https://raw.githubusercontent.com/sairootsmusic/sairootsmusic.com/refs/heads/main/IMG_20260321_173252_172.png" },
    { "t": "Evaluasi Lagi", "cat": "Critical Fire" },
    { "t": "Irama Hidup", "cat": "Critical Fire" },
    { "t": "Jamaican Sound", "cat": "Critical Fire" },
    { "t": "Ormas Tipu-Tipu", "cat": "Critical Fire" },
    { "t": "Propaganda", "cat": "Critical Fire" },
    { "t": "Roots Medication", "cat": "Critical Fire" },
    { "t": "Skank Patrol", "cat": "Critical Fire" },
    { "t": "Reborn Riddim", "cat": "Reborn Riddim" },
    { "t": "Autopsi Mic", "cat": "Reborn Riddim" },
    { "t": "Salam Dari Timur", "cat": "Reborn Riddim" },
    { "t": "Mantra Malam", "cat": "Reborn Riddim" },
    { "t": "Magic Mushroom", "cat": "Reborn Riddim" },
    { "t": "Rastaman", "cat": "Reborn Riddim" },
    { "t": "Melayang Pelan", "cat": "Reborn Riddim" },
    { "t": "Tanah Hijau", "cat": "Reborn Riddim" },
    { "t": "BBM Busuk", "cat": "Reborn Riddim" },
    { "t": "Kabur Saja Dulu", "cat": "Reborn Riddim" }
];

const listUI = document.getElementById('tracklistUI');
let currentCat = "";

db.forEach((song, index) => {
    if(song.cat !== currentCat) {
        currentCat = song.cat;
        const line = document.createElement('div');
        line.className = 'section-title-line';
        line.innerText = currentCat === "Single" ? "Single" : "Album: " + currentCat;
        listUI.appendChild(line);
    }

    const item = document.createElement('div');
    item.className = 'song-item';
    item.innerHTML = `<i class="fas fa-play"></i><span>${song.t}</span>`;
    item.onclick = () => playSong(index);
    listUI.appendChild(item);
});

function playSong(idx) {
    const song = db[idx];
    const defaultCover = "https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/sairoots.jpg";
    const cover = song.cover || defaultCover;

    document.getElementById('miniTitle').innerText = song.t;
    document.getElementById('npTitle').innerText = song.t;
    document.getElementById('miniCover').src = cover;
    document.getElementById('npCover').src = cover;
    
    document.querySelectorAll('.song-item').forEach((el, i) => {
        el.classList.toggle('active', i === idx);
    });
}

function showNP() { document.getElementById('nowPlaying').style.display = 'flex'; }
function hideNP() { document.getElementById('nowPlaying').style.display = 'none'; }
</script>
