<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="canonical" href="https://sairootsmusic.com/artikel" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
    <link rel="manifest" href="/site.webmanifest">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles | SAI Roots</title>
    <meta name="description" content="Kumpulan artikel musik, rilisan terbaru, dan perjalanan kreatif SAI Roots Music.">
    <meta name="theme-color" content="#0b0b0b">
    <meta name="msapplication-TileColor" content="#000000">

    <meta property="og:site_name" content="SAI Roots Music">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sairootsmusic.com/artikel">
    <meta property="og:title" content="Articles | SAI ROOTS">
    <meta property="og:description" content="Jelajahi berita dan artikel terbaru dari SAI Roots Music.">
    <meta property="og:image" content="https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/sairoots.jpg">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "name": "SAI Roots Music",
          "url": "https://sairootsmusic.com"
        },
        {
          "@type": "CollectionPage",
          "name": "SAI Roots Articles",
          "description": "Archive of music articles and news by SAI Roots Music",
          "url": "https://sairootsmusic.com/artikel"
        }
      ]
    }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0b0b0b; color: #e5e7eb; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
        .sai-card { background: #141414; border: 1px solid #222; border-radius: 12px; overflow: hidden; transition: all 0.3s ease; }
        .sai-card:hover { border-color: #22c55e; transform: translateY(-4px); box-shadow: 0 10px 30px -10px rgba(34, 197, 94, 0.3); }
        .btn-home { color: #666; font-size: 14px; font-weight: 600; transition: 0.3s; text-decoration: none; }
        .btn-home:hover { color: #fff; }
        .img-container { width: 100%; height: 220px; background: #000; overflow: hidden; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
        footer { text-align: center; margin-top: auto; padding: 50px 0 30px; border-top: 1px solid #111; }
        .copyright-link { text-decoration: none; color: #333; font-size: 11px; letter-spacing: 1px; font-weight: 700; transition: 0.3s; text-transform: uppercase; }
        .copyright-link:hover { color: #555; }
    </style>
</head>
<body>
    <nav class="p-8 max-w-5xl mx-auto flex items-center justify-between w-full">
        <a href="/" class="btn-home flex items-center gap-2">
            <i class="fa-solid fa-chevron-left text-xs"></i> HOME
        </a>
        <div class="text-right">
            <h1 class="text-2xl font-black uppercase italic tracking-tighter leading-none">
                LIST <span class="text-green-500">ARTICLE</span>
            </h1>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 mt-4 flex-grow w-full">
        <div id="article-list" class="space-y-10">
            <div class="flex flex-col items-center justify-center py-32 space-y-4">
                <div class="w-8 h-8 border-4 border-green-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-zinc-800 text-[10px] font-black uppercase tracking-[0.4em]">Synchronizing Database</p>
            </div>
        </div>
    </main>

    <footer><a href="copyright" class="copyright-link">© 2026 SAI Roots Music. All Rights Reserved.</a></footer>

    <script>
        const REPO = "sairootsmusic/sairootsmusic.com";
        const FOLDER = "artikel";
        async function init() {
            const list = document.getElementById('article-list');
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FOLDER}?t=${Date.now()}`);
                const files = await res.json();
                if(!Array.isArray(files)) throw new Error("Invalid Repository");
                const htmlFiles = files.filter(f => f.name.endsWith('.html')).reverse();
                const articleData = await Promise.all(htmlFiles.map(async (file) => {
                    try {
                        const fileRes = await fetch(file.download_url);
                        const htmlText = await fileRes.text();
                        const doc = new DOMParser().parseFromString(htmlText, 'text/html');
                        return {
                            title: doc.querySelector('h1')?.innerText || file.name.replace('.html', ''),
                            img: doc.querySelector('img')?.src || '',
                            summary: doc.querySelector('.content')?.innerText.substring(0, 160) || 'Click to read full story.',
                            link: `artikel/${file.name.replace('.html', '')}`
                        };
                    } catch (e) { return null; }
                }));
                list.innerHTML = "";
                articleData.forEach(art => {
                    if(!art) return;
                    list.innerHTML += `
                        <article class="sai-card shadow-2xl">
                            <div class="img-container">${art.img ? `<img src="${art.img}" alt="${art.title}">` : `<div class="flex items-center justify-center h-full bg-zinc-900"><i class="fa-solid fa-music text-zinc-800 text-4xl"></i></div>`}</div>
                            <div class="p-8">
                                <h2 class="text-2xl font-black text-white mb-3 uppercase">${art.title}</h2>
                                <p class="text-zinc-500 text-sm mb-6">${art.summary}...</p>
                                <a href="${art.link}" class="text-green-500 font-black uppercase tracking-widest hover:text-white">Read Full Story</a>
                            </div>
                        </article>`;
                });
            } catch (e) { list.innerHTML = `<p class="text-center py-20 text-red-900">Sync Error</p>`; }
        }
        init();
    </script>
</body>
</html>
