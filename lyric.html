<!DOCTYPE html>
<html lang="id">
<head>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SAI Roots Music",
      "url": "https://sairootsmusic.com"
    }
    </script>
    
    <link rel="canonical" href="https://sairootsmusic.com/lyric" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
    <link rel="manifest" href="/site.webmanifest">
    
    <meta name="theme-color" content="#000000">
    <meta name="msapplication-TileColor" content="#000000">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyrics Collection | SAI Roots</title>
    <meta name="description" content="Kumpulan lirik lagu lengkap SAI Roots. Drama Klenik, Senandung Manis, Eksploitasi, Babylon Burn, Propaganda dan banyak lagu reggae rap indie lainnya.">
    
    <meta property="og:title" content="Lyrics Collection | SAI Roots">
    <meta property="og:site_name" content="SAI Roots Music">
    <meta property="og:image" content="https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/sairoots.jpg">
    <meta property="og:url" content="https://sairootsmusic.com/lyric">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body { background: #080808; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; padding: 40px 20px; }
        .container { max-width: 450px; margin: auto; }
        .l-box { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .item { display: flex; align-items: center; padding: 16px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 8px; text-decoration: none; color: #fff; transition: 0.3s; border: 1px solid transparent; }
        .item:hover { background: rgba(29,185,84,0.1); border-color: #1db954; transform: translateX(5px); }
        .item i { margin-right: 15px; color: #1db954; }
        .footer { text-align: center; margin-top: 35px; font-size: 11px; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <div class="l-box">
        <h2 style="margin-bottom: 25px; font-weight: 800; text-align: center;">Koleksi Lirik</h2>
        
        <div id="lyricList">
            </div>
    </div>
    <div class="footer">© 2026 SAI Roots Music. All Rights Reserved.</div>
</div>

<script>
// Fixed JSON Keys with Quotes
const db = [
    { "t": "Drama Klenik", "u": "/lyric/dramaklenik" },
    { "t": "Senandung Manis", "u": "/lyric/senandungmanis" },
    { "t": "Eksploitasi", "u": "/lyric/eksploitasi" },
    { "t": "Babylon Burn", "u": "/lyric/babylonburn" },
    { "t": "Propaganda", "u": "/lyric/propaganda" }
];

const list = document.getElementById('lyricList');
db.forEach(item => {
    list.innerHTML += `
        <a href="${item.u}" class="item">
            <i class="fa fa-music"></i>
            <span>${item.t}</span>
        </a>
    `;
});
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "CollectionPage",
      "name": "SAI Roots Lyrics Library",
      "url": "https://sairootsmusic.com/lyric"
    },
    {
      "@type": "ItemList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "item": { "@type": "MusicRecording", "name": "Drama Klenik" }
        },
        {
          "@type": "ListItem",
          "position": 2,
          "item": { "@type": "MusicRecording", "name": "Senandung Manis" }
        }
      ]
    }
  ]
}
</script>
</body>
</html>
