<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAI Roots Music</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root { --accent: #1db954; --bg: #080808; }
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
body { background: var(--bg); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.card { max-width: 420px; width: 100%; background: rgba(255,255,255,0.03); border-radius: 35px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
.banner { height: 180px; background: url('https://raw.githubusercontent.com/pembri/SAI-Roots-Official/refs/heads/main/IMG_20260407_232759_337.jpg') center/cover; position: relative; }
.banner::after { content:''; position: absolute; inset:0; background: linear-gradient(transparent, var(--bg)); }
.profile { text-align: center; margin-top: -65px; position: relative; z-index: 5; padding: 0 20px; }
.profile-img { width: 125px; height: 125px; border-radius: 50%; border: 4px solid var(--bg); object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.links { padding: 25px; }
.link-box { display: flex; align-items: center; background: rgba(255,255,255,0.05); padding: 14px 20px; border-radius: 16px; text-decoration: none; color: #fff; margin-bottom: 10px; border: 1px solid transparent; transition: 0.3s; }
.link-box:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); transform: translateY(-3px); }
.link-box i { width: 30px; font-size: 18px; color: var(--accent); }
.link-box span { font-weight: 600; font-size: 14px; flex-grow: 1; }
.footer-text { text-align: center; padding: 25px; font-size: 11px; color: #444; }
</style>
</head>
<body>
<div class="card">
  <div class="banner"></div>
  <div class="profile">
    <img src="https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/sairoots.jpg" class="profile-img">
    <h1 style="font-size: 26px; font-weight: 800; margin-top: 10px;">SAI Roots Music</h1>
    <div style="font-size: 12px; color: #888; letter-spacing: 2px;">OFFICIAL WEBSITE</div>
  </div>
  <div class="links">
    <a href="https://youtube.com/@sairoots" class="link-box" target="_blank"><i class="fab fa-youtube"></i><span>YouTube</span></a>
    <a href="https://open.spotify.com/artist/0xOPCtZvhXVd9RTbU1aYTr?si=nxAN278ZQCy4A9reytgBVA" class="link-box" target="_blank"><i class="fab fa-spotify"></i><span>Spotify</span></a>
    <a href="https://instagram.com/ahmadsupembri" class="link-box" target="_blank"><i class="fab fa-instagram"></i><span>Instagram</span></a>
    <a href="https://tiktok.com/@ahmadsupembri" class="link-box" target="_blank"><i class="fab fa-tiktok"></i><span>TikTok</span></a>
    <a href="https://facebook.com/ahmadsupembri" class="link-box" target="_blank"><i class="fab fa-facebook"></i><span>Facebook</span></a>
    <a href="https://x.com/ahmadsupembri" class="link-box" target="_blank"><i class="fab fa-x-twitter"></i><span>X (Twitter)</span></a>
    <hr style="opacity:0.05; margin: 15px 0;">
    <a href="music.html" class="link-box"><i class="fa-solid fa-record-vinyl"></i><span>Album & Single</span></a>
    <a href="lyric.html" class="link-box"><i class="fa-solid fa-file-lines"></i><span>Lirik Lagu</span></a>
    <a href="tentang.html" class="link-box"><i class="fa-solid fa-circle-info"></i><span>Tentang</span></a>
  </div>
  <div class="footer-text">© 2026 SAI Roots Music. All Rights Reserved.</div>
</div>
</body>
</html>
