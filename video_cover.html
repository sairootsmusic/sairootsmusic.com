<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Collection | SAI Roots Music</title>
    <style>
        :root { --blue: #3b82f6; --bg: #0d0d0d; --card: #151515; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        header { padding: 20px; display: flex; align-items: center; border-bottom: 1px solid #222; }
        .logo { font-weight: 900; font-style: italic; text-transform: uppercase; font-size: 22px; }
        .logo span { color: var(--blue); }
        .search-container { padding: 20px; max-width: 800px; margin: auto; }
        #search { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--blue); transform: translateY(-5px); }
        .thumb { width: 100%; aspect-ratio: 16/9; background-size: cover; background-position: center; }
        .info { padding: 15px; }
        .info h3 { margin: 0; font-size: 18px; text-transform: uppercase; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; overflow-y: auto; }
        .modal-body { max-width: 800px; margin: 50px auto; background: #111; border-radius: 15px; position: relative; }
        .player { position: relative; padding-bottom: 56.25%; height: 0; }
        .player iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:0; }
        .close { position: absolute; right: 20px; top: 10px; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <header><div class="logo">SAI ROOTS <span>VIDEO</span></div></header>
    <div class="search-container"><input type="text" id="search" placeholder="Cari video..." onkeyup="doSearch()"></div>
    <div class="grid" id="container"></div>

    <div id="vModal" class="modal" onclick="closeV()">
        <div class="modal-body" onclick="event.stopPropagation()">
            <span class="close" onclick="closeV()">&times;</span>
            <div class="player" id="pTarget"></div>
            <div style="padding: 25px;">
                <h2 id="mTitle" style="color:var(--blue)"></h2>
                <p id="mDesc" style="white-space: pre-wrap; color:#ccc; line-height:1.6"></p>
            </div>
        </div>
    </div>

    <script>
        // ---START_DATA---
        const videoData = [];
        // ---END_DATA---

        function render(data) {
            const grid = document.getElementById('container');
            grid.innerHTML = data.map((v, i) => `
                <div class="card" onclick="openV('${v.id}')">
                    <div class="thumb" style="background-image:url('https://img.youtube.com/vi/${v.id}/mqdefault.jpg')"></div>
                    <div class="info"><h3>${v.title}</h3><p style="color:#666;font-size:13px">SAI ROOTS MUSIC</p></div>
                </div>
            `).join('');
        }

        function openV(id) {
            const v = videoData.find(x => x.id === id);
            document.getElementById('pTarget').innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`;
            document.getElementById('mTitle').innerText = v.title;
            document.getElementById('mDesc').innerText = v.desc;
            document.getElementById('vModal').style.display = 'block';
            window.history.pushState(null, null, `?v=${id}`);
        }

        function closeV() {
            document.getElementById('vModal').style.display = 'none';
            document.getElementById('pTarget').innerHTML = '';
            window.history.pushState(null, null, window.location.pathname);
        }

        function doSearch() {
            const q = document.getElementById('search').value.toLowerCase();
            render(videoData.filter(x => x.title.toLowerCase().includes(q)));
        }

        window.onload = () => {
            render(videoData);
            const p = new URLSearchParams(window.location.search).get('v');
            if(p) { const v = videoData.find(x => x.id === p); if(v) openV(v.id); }
        };
    </script>
</body>
</html>
